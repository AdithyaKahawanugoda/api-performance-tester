name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9"
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @api-perf/shared build

      - name: Typecheck all packages
        run: pnpm typecheck

  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend Dockerfile
        run: docker buildx build --file docker/backend.Dockerfile --tag api-perf/backend:ci . --load

      - name: Validate worker Dockerfile
        run: docker buildx build --file docker/worker.Dockerfile --tag api-perf/worker:ci . --load

      - name: Integration smoke test
        run: |
          docker compose -f docker-compose.dev.yml up -d
          sleep 10
          docker run --rm --network="host" curlimages/curl:latest curl -f http://localhost:4000/api/health
          docker compose -f docker-compose.dev.yml down
        env:
          MONGO_PASSWORD: ci_password
          REDIS_PASSWORD: ci_password
