name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @api-perf/shared build

      - name: Typecheck all packages
        run: pnpm typecheck

  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend Dockerfile
        run: docker buildx build --file docker/backend.Dockerfile --tag api-perf/backend:ci . --load

      - name: Validate worker Dockerfile
        run: docker buildx build --file docker/worker.Dockerfile --tag api-perf/worker:ci . --load

      - name: Integration smoke test
        run: |
          docker compose -f docker-compose.dev.yml up -d --wait
          docker run -d \
            --name backend-smoke \
            --network host \
            -e NODE_ENV=production \
            -e PORT=4000 \
            -e MONGODB_URI="mongodb://admin:changeme_dev@localhost:27017/api-perf?authSource=admin" \
            -e REDIS_URL="redis://:changeme_dev@localhost:6379" \
            -e LOG_LEVEL=info \
            -e CORS_ORIGIN="http://localhost:3000" \
            api-perf/backend:ci
          for i in $(seq 1 15); do
            curl -sf http://localhost:4000/api/health && break
            echo "Waiting for backend... attempt $i/15"
            sleep 2
          done
          echo "--- backend-smoke container logs ---"
          docker logs backend-smoke || true
          echo "--- end logs ---"
          curl -f http://localhost:4000/api/health
          docker stop backend-smoke || true
          docker compose -f docker-compose.dev.yml down
